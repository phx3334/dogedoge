server:
  host: ${APP_SERVER_HOST:-0.0.0.0}
  port: ${APP_SERVER_PORT:-8080}
  sessions_secret: "${APP_SERVER_SESSIONS_SECRET:-}"
  use_multipoint: ${APP_SERVER_USE_MULTIPOINT:-true}
  router_prefix: ${APP_SERVER_ROUTER_PREFIX:-api/v1}
 
upload:
  path: ${APP_UPLOAD_PATH:-/app/uploads}
  max_file_size: ${APP_UPLOAD_MAX_FILE_SIZE:-524288000}
  temp_upload_dir: ${APP_UPLOAD_TEMP_UPLOAD_DIR:-/app/uploads/temp}

storage:
  driver: ${APP_STORAGE_DRIVER:-local}
  base_dir: ${APP_STORAGE_BASE_DIR:-/app/uploads}

qiniu:
  zone: ${APP_QINIU_ZONE:-z2}
  bucket: "${APP_QINIU_BUCKET:-}"
  domain: "${APP_QINIU_DOMAIN:-}"
  access_key: "${APP_QINIU_ACCESS_KEY:-}"
  secret_key: "${APP_QINIU_SECRET_KEY:-}"
  use_https: ${APP_QINIU_USE_HTTPS:-false}
  use_cdn_domains: ${APP_QINIU_USE_CDN_DOMAINS:-false}
  max_file_size: ${APP_QINIU_MAX_FILE_SIZE:-524288000}

transcode:
  queue_name: ${APP_TRANSCODE_QUEUE_NAME:-mini_bili_transcode}
  concurrency: ${APP_TRANSCODE_CONCURRENCY:-2}
  timeout: ${APP_TRANSCODE_TIMEOUT:-1800}

ffmpeg:
  binary_path: ${APP_FFMPEG_BINARY_PATH:-ffmpeg}
  output_codec: ${APP_FFMPEG_OUTPUT_CODEC:-libx264}
  crf: ${APP_FFMPEG_CRF:-23}
  preset: ${APP_FFMPEG_PRESET:-medium}

email:
  host: ${APP_EMAIL_HOST:-smtp.qq.com}
  port: ${APP_EMAIL_PORT:-465}
  from: ${APP_EMAIL_FROM:-1173604833@qq.com}
  nickname: ${APP_EMAIL_NICKNAME:-fzsirrr}
  secret: "${APP_EMAIL_SECRET:-}"
  is_tls: ${APP_EMAIL_IS_TLS:-true}

jwt:
  access_token_secret: "${APP_JWT_ACCESS_TOKEN_SECRET:-}"
  refresh_token_secret: "${APP_JWT_REFRESH_TOKEN_SECRET:-}"
  access_token_expiry_time: ${APP_JWT_ACCESS_TOKEN_EXPIRY_TIME:-15m}
  refresh_token_expiry_time: ${APP_JWT_REFRESH_TOKEN_EXPIRY_TIME:-7d}
  issuer: ${APP_JWT_ISSUER:-fake_tiktok}

captcha:
  height: ${APP_CAPTCHA_HEIGHT:-80}
  width: ${APP_CAPTCHA_WIDTH:-240}
  length: ${APP_CAPTCHA_LENGTH:-6}
  max_skew: ${APP_CAPTCHA_MAX_SKEW:-0.7}
  dot_count: ${APP_CAPTCHA_DOT_COUNT:-80}

database:
  host: ${APP_DATABASE_HOST:-mysql}
  port: ${APP_DATABASE_PORT:-3306}
  user: ${APP_DATABASE_USER:-root}
  password: "${APP_DATABASE_PASSWORD:-}"
  dbname: ${APP_DATABASE_DBNAME:-feedsystem}
  max_idle_conns: ${APP_DATABASE_MAX_IDLE_CONNS:-10}
  max_open_conns: ${APP_DATABASE_MAX_OPEN_CONNS:-100}
  auto_migrate: ${APP_DATABASE_AUTO_MIGRATE:-false}

redis:
  host: ${APP_REDIS_HOST:-redis}
  port: ${APP_REDIS_PORT:-6379}
  password: "${APP_REDIS_PASSWORD:-}"
  db: ${APP_REDIS_DB:-0}
  key_prefix: ${APP_REDIS_KEY_PREFIX:-feedsystem:v1}

rabbitmq:
  host: ${APP_RABBITMQ_HOST:-rabbitmq}
  port: ${APP_RABBITMQ_PORT:-5672}
  username: ${APP_RABBITMQ_USERNAME:-admin}
  password: "${APP_RABBITMQ_PASSWORD:-}"

elasticsearch:
  host: ${APP_ELASTICSEARCH_HOST:-http://elasticsearch:9200}
  username: "${APP_ELASTICSEARCH_USERNAME:-}"
  password: "${APP_ELASTICSEARCH_PASSWORD:-}"

gaode:
  api_key: "${APP_GAODE_API_KEY:-}"

zap:
  level: ${APP_ZAP_LEVEL:-info}
  filename: ${APP_ZAP_FILENAME:-/app/logs/fake_tiktok.log}
  max_size: ${APP_ZAP_MAX_SIZE:-100}
  max_backups: ${APP_ZAP_MAX_BACKUPS:-15}
  max_age: ${APP_ZAP_MAX_AGE:-15}
  compress: ${APP_ZAP_COMPRESS:-false} 
  is_console_print: ${APP_ZAP_IS_CONSOLE_PRINT:-true}

run_cron: ${APP_RUN_CRON:-false}

ai:   
  api_key: "${APP_AI_API_KEY:-}"
  base_url: ${APP_AI_BASE_URL:-https://api.deepseek.com}
  model: ${APP_AI_MODEL:-deepseek-v4-flash}
