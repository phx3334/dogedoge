# =============================================================================
# Redis 7 生产级混合持久化配置 (RDB + AOF + 混合模式)
# =============================================================================
# 本文件由 docker-compose 挂载到容器内 /usr/local/etc/redis/redis.conf
# 部署位置: deploy/redis/redis.conf
# 配套文档: deploy/redis/README.md
#
# 设计目标:
#   1. 数据零丢失: 写操作追加 AOF，秒级 fsync
#   2. 重启快速: 混合模式 AOF 头部为 RDB 快照，加载远快于纯 AOF replay
#   3. 内存可控: 2GB 上限 + allkeys-lru 淘汰，O(1) 热点保留
#   4. 运维可见: 慢查询日志 + 客户端输出缓冲限流
# =============================================================================


# -----------------------------------------------------------------------------
# 基础安全 / 网络
# -----------------------------------------------------------------------------
# 监听所有接口。容器内部署, 由 docker-compose 端口映射对外暴露。
# 生产环境如需限制可改为 0.0.0.0 或具体内网 IP。
bind 0.0.0.0

# 关闭 protected-mode。
# 容器内默认仅有受控网络, protected-mode 主要针对无密码公网暴露场景。
# 本地开发不设置密码, 依赖容器网络隔离, 生产环境建议开启并配置 requirepass。
protected-mode no

# 访问密码。
requirepass 147258

# 不以 daemon 方式运行, 容器前台进程由 docker-compose 管理生命周期。
daemonize no

# 日志级别: notice 记录关键生命周期事件, 不刷 debug 噪声。
loglevel notice

# RDB / AOF 文件存储目录。容器内 /data 由 docker volume 持久化。
dir /data


# -----------------------------------------------------------------------------
# RDB 快照策略 (三档配置)
# -----------------------------------------------------------------------------
# 三档组合提供"时间 × 写量"双维度触发, 平衡数据安全性与磁盘 IO。
#
# save 900 1      - 900秒(15分钟)内至少有 1 次写操作, 触发 RDB 快照
#                   业务含义: 兜底触发, 保证最长丢失 15 分钟数据
#
# save 300 10     - 300秒(5分钟)内至少有 10 次写操作, 触发 RDB 快照
#                   业务含义: 中等活跃度场景, 5 分钟级别的数据窗口
#
# save 60 10000   - 60秒(1分钟)内至少有 10000 次写操作, 触发 RDB 快照
#                   业务含义: 写高峰(如 ZSet 重建、批量导入)触发密集快照
#
# 三档并行, 任何一条满足即触发 bgsave。
save 900 1
save 300 10
save 60 10000

# BGSAVE 失败时停止接收写操作, 防止 RDB 损坏未被发现。
# 数据安全优先, 宁可服务降级也不要持久化静默失效。
stop-writes-on-bgsave-error yes

# RDB 文件启用 LZF 压缩, 减少磁盘占用和 IO 时间(以 CPU 为代价, 通常可接受)。
rdbcompression yes

# RDB 文件尾部写入 CRC64 校验和, 加载时校验文件完整性。
# 关闭可小幅减少写入开销, 生产环境建议开启。
rdbchecksum yes

# RDB 文件名, 与 AOF 文件名对应, 都在 dir 目录下。
dbfilename dump.rdb


# -----------------------------------------------------------------------------
# AOF 持久化 (混合模式)
# -----------------------------------------------------------------------------
# 开启 AOF。混合模式下, AOF 既是增量日志也是 RDB 快照的载体。
appendonly yes

# AOF 文件名。
appendfilename "appendonly.aof"

# fsync 策略: everysec 平衡性能与安全, 最多丢失 1 秒数据。
# 三个可选值:
#   - always: 每次写都 fsync, 最安全但 IO 开销大, 写性能下降约 50%
#   - everysec: 后台线程每秒 fsync 一次, 推荐生产配置
#   - no: 由 OS 决定 fsync 时机, 性能最好但宕机可能丢失数秒数据
appendfsync everysec

# Rewrite 期间是否暂停 fsync。
# - no (本配置): rewrite 时继续 fsync, 写入最新数据; 可能阻塞 rewrite 但数据更安全
# - yes: rewrite 期间停止 fsync, rewrite 更快但新增数据可能丢失
# 容器磁盘性能通常受限, 选 no 以保证数据完整性。
no-appendfsync-on-rewrite no

# AOF Rewrite 触发条件之一: 当前 AOF 体积比上次 rewrite 后增长 100% (翻倍)。
# 与下面的 min-size 共同决定是否触发后台 rewrite。
auto-aof-rewrite-percentage 100

# AOF Rewrite 触发条件之二: AOF 文件至少达到 64MB 才考虑 rewrite。
# 避免小文件频繁 rewrite 浪费 IO, 此处阈值匹配业务数据规模(单实例 2GB 内存下约 3%)。
auto-aof-rewrite-min-size 64mb

# 加载截断的 AOF 文件。
# 当 Redis 异常宕机时, AOF 文件末尾可能不完整, 默认行为是优雅截断并继续加载。
# 关闭将导致启动失败, 需手动 redis-check-aof 修复。
aof-load-truncated yes


# -----------------------------------------------------------------------------
# 混合模式 (Redis 7 关键特性)
# -----------------------------------------------------------------------------
# AOF Rewrite 时使用 RDB 格式作为文件头, 后续追加增量 AOF 格式。
#
# 文件结构示意:
#   ┌─────────────────────────┬─────────────────────┐
#   │   RDB 快照 (二进制)      │   增量 AOF (文本)    │
#   │   rewrite 时刻全量数据   │   rewrite 后所有写   │
#   │   加载速度极快           │   恢复精度高          │
#   └─────────────────────────┴─────────────────────┘
#
# 收益:
#   - 重启恢复速度: 接近 RDB 加载, 远快于纯 AOF replay
#   - 数据安全:   仍具备 AOF 的秒级持久化保证
#   - 文件体积:   由 rewrite 百分比控制, 不会无限增长
#
# 必须在 Redis 4.0+ 启用, 本项目使用 redis:7-alpine 完全支持。
aof-use-rdb-preamble yes


# -----------------------------------------------------------------------------
# 内存管理
# -----------------------------------------------------------------------------
# 内存上限 2GB。生产环境应与 docker-compose mem_limit / k8s resources.limit 保持一致。
# 触发 maxmemory 后, 按 maxmemory-policy 淘汰键。
maxmemory 2gb

# 淘汰策略: allkeys-lru, 在所有键中淘汰最久未访问的。
#
# 各策略对比:
#   - noeviction: 写满后拒绝写入(默认), 适合数据强一致场景
#   - allkeys-lru: 所有键中 LRU 淘汰, 适合通用缓存(本项目选择)
#   - volatile-lru: 仅淘汰带 TTL 的键, 适合混合持久数据 + 缓存
#   - allkeys-lfu: LFU 淘汰(Redis 4.0+), 比 LRU 更精准但有内存开销
#
# 本项目 Redis 主要用途:
#   - 用户/视频静态缓存 (可重建, 丢失不影响数据完整性)
#   - 热度 ZSet (可由 worker 重建)
#   - 验证码 / 限流 (TTL 短, 自动过期)
# 全部可重建或带 TTL, allkeys-lru 是性价比最高的选择。
maxmemory-policy allkeys-lru


# -----------------------------------------------------------------------------
# 慢查询日志
# -----------------------------------------------------------------------------
# 执行时间超过 10ms (10000 微秒) 的命令记录到慢查询日志。
# 单位是微秒, 10ms 是一个保守阈值, 正常命令应在 1ms 以内。
slowlog-log-slower-than 10000

# 慢查询日志保留最近 128 条。FIFO 淘汰, 占用内存极小。
slowlog-max-len 128


# -----------------------------------------------------------------------------
# 客户端输出缓冲限制
# -----------------------------------------------------------------------------
# 防止慢消费者占用过多服务端内存。三类连接分别配置:
#
# normal: 普通客户端连接, 不限流 (0 表示不限制)
client-output-buffer-limit normal 0 0 0

# replica: 主从复制连接, 限制硬限 256MB / 软限 64MB / 60秒。
# 防止从节点消费慢导致主节点内存暴涨。
client-output-buffer-limit replica 256mb 64mb 60

# pubsub: 订阅发布连接, 限制硬限 32MB / 软限 8MB / 60秒。
# 弹幕/通知等 pubsub 场景必须有上限, 防止慢订阅者把 Redis 内存吃光。
client-output-buffer-limit pubsub 32mb 8mb 60
