# 生产部署编排（配合 GitHub Actions + GHCR）
#
# 镜像统一从 ghcr.io/${GHCR_OWNER}/fake_tiktok-{api,worker,web}:latest 拉取
# 所有密钥集中在 /opt/fake_tiktok/.env（已被 .gitignore 忽略，切勿提交）：
#   - 基础设施密码（MYSQL_*/RABBITMQ_*/REDIS_PASSWORD）用于 compose 变量替换
#   - APP_* 通过 env_file 注入 api/worker 容器
# 启动：cd /opt/fake_tiktok && docker compose up -d

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-147258}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-feedsystem}"
      TZ: "Asia/Shanghai"
    # 生产环境不建议把数据库端口暴露到公网，需要时再打开
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-147258} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
      - ./deploy/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      # 注意：redis 实际密码写死在 deploy/redis/redis.conf（requirepass 147258），
      # 修改密码需同步该文件与 .env 中的 APP_REDIS_PASSWORD / REDIS_PASSWORD
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-147258} ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:-admin}"
      RABBITMQ_DEFAULT_PASSWORD: "${RABBITMQ_DEFAULT_PASSWORD:-147258}"
    # ports:
    #   - "15672:15672"   # 管理后台，按需打开
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: elasticsearch:8.13.4
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ELASTIC_PASSWORD: "147258"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    # ports:
    #   - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    image: ghcr.io/${GHCR_OWNER:-OWNER}/fake_tiktok-api:latest
    restart: always
    env_file: .env
    environment:
      CONFIG_NAME: config.docker
      APP_SKIP_CAPTCHA: "1"
      # 以下覆盖 .env 中的 localhost，改为 Docker 服务名
      APP_DATABASE_HOST: mysql
      APP_DATABASE_PORT: 3306
      APP_DATABASE_USER: root
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_RABBITMQ_HOST: rabbitmq
      APP_RABBITMQ_PORT: 5672
      # 关键修复：api 也要连 RabbitMQ 发布转码消息。
      # 之前漏配 USERNAME/PASSWORD，导致用 admin/空密码 连接，
      # 被 broker 拒绝 (403 username or password not allowed)，
      # 消息无法发布、转码队列从未声明 → 视频上传永远卡在 draft。
      # 直接引用与 rabbitmq 服务相同的变量，保证账号密码一致。
      APP_RABBITMQ_USERNAME: "${RABBITMQ_DEFAULT_USER:-admin}"
      APP_RABBITMQ_PASSWORD: "${RABBITMQ_DEFAULT_PASSWORD:-147258}"
      APP_ELASTICSEARCH_HOST: http://elasticsearch:9200
      APP_AI_BASE_URL: https://api.deepseek.com
      APP_AI_MODEL: deepseek-v4-flash
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 8s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/${GHCR_OWNER:-OWNER}/fake_tiktok-worker:latest
    restart: always
    env_file: .env
    environment:
      CONFIG_NAME: config.docker
      APP_RUN_CRON: "true"
      APP_DATABASE_HOST: mysql
      APP_DATABASE_PORT: 3306
      APP_DATABASE_USER: root
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_RABBITMQ_HOST: rabbitmq
      APP_RABBITMQ_PORT: 5672
      # 关键修复：worker 消费转码队列必须连上 RabbitMQ。
      # 之前漏配 USERNAME/PASSWORD，用 admin/空密码 连接被拒 (403)，
      # 导致转码队列从未声明、消息被静默丢弃、上传永远卡在 draft。
      # 引用与 rabbitmq 服务相同的变量，保证账号密码一致。
      APP_RABBITMQ_USERNAME: "${RABBITMQ_DEFAULT_USER:-admin}"
      APP_RABBITMQ_PASSWORD: "${RABBITMQ_DEFAULT_PASSWORD:-147258}"
      APP_ELASTICSEARCH_HOST: http://elasticsearch:9200
      APP_AI_BASE_URL: https://api.deepseek.com
      APP_AI_MODEL: deepseek-v4-flash
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep worker || exit 1"]
      interval: 8s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/${GHCR_OWNER:-OWNER}/fake_tiktok-web:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  uploads_data:
  logs_data:
