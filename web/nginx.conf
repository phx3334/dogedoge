server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 允许上传大文件（视频等），避免 413 "client intended to send too large body"
    client_max_body_size 1g;
    client_body_timeout 1800s;
    client_body_buffer_size 16m;

    # 关键修复：Docker 内嵌 DNS（127.0.0.11）。
    # 默认 nginx 在启动时把 upstream 主机名（api）解析成 IP 并长期缓存；
    # 当 api 容器被 recreate（换 IP，例如 docker compose up -d 重新部署）后，
    # nginx 仍连旧 IP -> 代理失败、浏览器看到 502 Bad Gateway，直到 nginx 重载。
    # 用 resolver + 变量型 proxy_pass 让每次请求都重新解析，
    # 容器换 IP 后自动恢复，不再出现"部署完反而 502"的诡异现象。
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 前端为 SPA，未匹配到静态资源时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 业务 API：相对路径 /api/v1 -> 后端 api 服务（走 docker 内部网络）
    # 用变量 $api_upstream 触发运行时 DNS 重新解析（配合上方 resolver）
    location /api/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 大文件上传超时（1GB 慢速上行需 30 分钟余量）
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_request_buffering off;
    }

    # WebSocket（如私信/通知）
    location /ws/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # 静态资源（七牛云托管后基本用不到，保留以防回退 local 存储）
    location /uploads/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
    }
}
